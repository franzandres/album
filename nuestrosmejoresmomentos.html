        }

        .nombre-video {
            margin-top: 10px;
            color: #ff0000;
            font-size: 18px;
        }

        .boton-volver {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 30px;
            background: #ffd700;
            color: black;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
