<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Red Profesional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">MiRed</div>
        <div class="search-bar"><input type="text" placeholder="Buscar..."></div>
    </header>

    <main class="container">
        <section class="feed">
            <div class="post-creator">¿Qué estás pensando?</div>
        </section>

        <aside class="sidebar-chat">
            <h3>Contactos</h3>
            
            <div class="contact-card">
                <div class="profile-group">
                    <div class="avatar">
                        <span class="status-dot"></span>
                    </div>
                    <span class="name">Juan Pérez</span>
                </div>
                
                <div class="chat-input-container">
                    <input type="text" placeholder="Escribe un mensaje..." class="mini-chat">
                    <button class="send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </aside>
    </main>

</body>
</html>
